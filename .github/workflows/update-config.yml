name: Update Working Configs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Clear old configs
        run: rm -rf configs && mkdir -p configs

      - name: Run collector
        run: python scripts/check_configs.py

      - name: Commit and push
        run: |
          git add configs/

          if git diff --cached --quiet; then
            echo "No changes. Skipping commit."
            exit 0
          fi

          TOTAL=$(python -c "import json; d=json.load(open('configs/stats.json')); print(d['total_configs'])")
          IPV6=$(python  -c "import json; d=json.load(open('configs/stats.json')); print(d.get('ipv6_configs', 0))")
          RU=$(python    -c "import json; d=json.load(open('configs/stats.json')); print(d.get('russia_configs', 0))")
          RL=$(python    -c "import json; d=json.load(open('configs/stats.json')); print(d.get('reality_configs', 0))")

          git commit -m "chore: update configs [total=$TOTAL ru=$RU reality=$RL ipv6=$IPV6] $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin main
